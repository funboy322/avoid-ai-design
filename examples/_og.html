<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  *{ margin:0; padding:0; box-sizing:border-box; }
  :root{ --paper:#f4efe4; --accent:#c2410c; --mut:#a99d87; }
  html,body{ width:1200px; height:630px; overflow:hidden; }
  body{
    background: radial-gradient(1000px 460px at 22% -12%, #251d12, #131009 70%);
    font-family:"Avenir Next","Helvetica Neue",sans-serif; color:var(--paper);
    -webkit-font-smoothing:antialiased; padding:54px 60px; position:relative;
  }
  .top{ display:flex; justify-content:space-between; align-items:center; }
  .wm{ font-family:"Hoefler Text",Georgia,serif; font-size:25px; font-weight:700; }
  .wm b{ color:var(--accent); }
  .top .meta{ font-family:"SF Mono",Menlo,monospace; font-size:13px; letter-spacing:.1em; color:var(--mut); }
  .eyebrow{ font-family:"SF Mono",Menlo,monospace; font-size:14px; letter-spacing:.2em; color:var(--accent);
            text-transform:uppercase; margin-top:64px; }
  h1{ font-family:"Hoefler Text",Georgia,serif; font-weight:700; font-size:62px; line-height:1.02;
      letter-spacing:-.02em; margin-top:18px; }
  h1 em{ font-style:italic; color:var(--accent); }
  .sub{ font-size:19px; line-height:1.55; color:#ccc0aa; max-width:560px; margin-top:22px; }
  .chips{ position:absolute; left:60px; bottom:54px; display:flex; gap:10px; }
  .chips span{ font-family:"SF Mono",Menlo,monospace; font-size:13px; color:#d8cab2; padding:8px 14px;
               border:1px solid rgba(255,255,255,.16); border-radius:8px; }
  /* mini before/after */
  .mini{ position:absolute; right:60px; bottom:50px; display:flex; align-items:center; gap:0; }
  .mp{ position:relative; width:210px; height:158px; border-radius:11px; overflow:hidden;
       box-shadow:0 30px 50px -24px rgba(0,0,0,.7), 0 0 0 1px rgba(255,255,255,.06); }
  .mp iframe{ width:1200px; height:903px; border:0; transform:scale(.175); transform-origin:top left; }
  .mlabel{ position:absolute; top:9px; left:9px; font-family:"SF Mono",Menlo,monospace; font-size:10px;
           font-weight:700; letter-spacing:.12em; padding:4px 8px; border-radius:5px; }
  .mlabel.b{ background:rgba(15,12,8,.6); color:#d8cab2; }
  .mlabel.a{ background:var(--accent); color:#fff; }
  .marrow{ width:40px; height:40px; border-radius:50%; background:var(--accent); color:#fff; display:grid;
           place-items:center; font-size:18px; margin:0 -20px; z-index:4; box-shadow:0 10px 20px -6px rgba(194,65,12,.7); }
</style>
</head>
<body>
  <div class="top">
    <div class="wm">avoid<b>-ai-</b>design</div>
    <div class="meta">SKILL.md · agentskills.io 1.0</div>
  </div>

  <div class="eyebrow">// de-slop your frontend</div>
  <h1>Make AI-generated UI<br>look like a <em>human</em> made it.</h1>
  <p class="sub">A Claude Code skill that audits your frontend and rewrites it around one committed design direction.</p>

  <div class="chips"><span>HTML / CSS</span><span>React · Tailwind · shadcn</span><span>detect + rewrite</span></div>

  <div class="mini">
    <div class="mp"><div class="mlabel b">BEFORE</div><iframe src="before.html" scrolling="no"></iframe></div>
    <div class="marrow">&rarr;</div>
    <div class="mp"><div class="mlabel a">AFTER</div><iframe src="after.html" scrolling="no"></iframe></div>
  </div>
</body>
</html>
